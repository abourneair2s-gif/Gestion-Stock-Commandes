<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockPro – AIR2S</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --bg2: #171b26;
  --bg3: #1e2333;
  --surface: #242a3e;
  --surface2: #2d3450;
  --border: #333d5c;
  --border2: #404d75;
  --accent: #f47c20;
  --accent2: #ff9a45;
  --blue: #4a9eff;
  --green: #36c98e;
  --red: #ff5555;
  --yellow: #ffcc44;
  --text: #e8eaf0;
  --text2: #9aa3c0;
  --text3: #636e94;
  --radius: 10px;
  --radius2: 16px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
h1,h2,h3 { font-family: 'Syne', sans-serif; }

/* LAYOUT */
.app { display: flex; height: 100vh; overflow: hidden; }
.sidebar {
  width: 220px; min-width: 220px; background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding: 0 0 1rem;
}
.sidebar-logo {
  padding: 1.25rem 1.25rem 1rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0.5rem;
}
.sidebar-logo h1 { font-size: 1.3rem; color: var(--accent); letter-spacing: -0.02em; }
.sidebar-logo p { font-size: 0.7rem; color: var(--text3); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.1em; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 0.6rem 1.25rem;
  cursor: pointer; border-radius: 8px; margin: 2px 0.5rem;
  font-size: 0.85rem; color: var(--text2);
  transition: all 0.15s; border: none; background: none; width: calc(100% - 1rem); text-align: left;
}
.nav-item:hover { background: var(--surface); color: var(--text); }
.nav-item.active { background: var(--accent); color: #fff; font-weight: 500; }
.nav-item .icon { font-size: 1.1rem; width: 20px; text-align: center; }
.nav-sep { height: 1px; background: var(--border); margin: 0.5rem 1.25rem; }
.nav-label { font-size: 0.65rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; padding: 0.5rem 1.25rem 0.25rem; }

.main { flex: 1; overflow-y: auto; background: var(--bg); }
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem 1.5rem; background: var(--bg2);
  border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50;
}
.topbar-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 600; }
.topbar-actions { display: flex; gap: 0.5rem; align-items: center; }

.content { padding: 1.5rem; }

/* CARDS */
.card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius2); padding: 1.25rem;
}
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
.kpi {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius2); padding: 1rem 1.25rem;
}
.kpi-label { font-size: 0.75rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.4rem; }
.kpi-value { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 700; color: var(--text); }
.kpi-sub { font-size: 0.75rem; color: var(--text3); margin-top: 2px; }
.kpi.accent .kpi-value { color: var(--accent); }
.kpi.green .kpi-value { color: var(--green); }
.kpi.red .kpi-value { color: var(--red); }
.kpi.blue .kpi-value { color: var(--blue); }

/* TABLE */
.table-wrap { overflow-x: auto; border-radius: var(--radius2); border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
thead th {
  background: var(--bg3); padding: 0.75rem 1rem;
  text-align: left; font-size: 0.72rem; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500;
  border-bottom: 1px solid var(--border);
}
tbody td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: var(--surface); }

/* BADGES */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 20px; font-size: 0.72rem; font-weight: 500;
}
.badge.green { background: rgba(54,201,142,0.15); color: var(--green); }
.badge.red { background: rgba(255,85,85,0.15); color: var(--red); }
.badge.yellow { background: rgba(255,204,68,0.15); color: var(--yellow); }
.badge.blue { background: rgba(74,158,255,0.15); color: var(--blue); }
.badge.orange { background: rgba(244,124,32,0.15); color: var(--accent); }
.badge.gray { background: var(--surface); color: var(--text2); }

/* BUTTONS */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 0.5rem 1rem; border-radius: var(--radius);
  font-size: 0.85rem; font-weight: 500; cursor: pointer;
  border: none; transition: all 0.15s; font-family: 'DM Sans', sans-serif;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); }
.btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border2); }
.btn-secondary:hover { background: var(--surface2); }
.btn-danger { background: rgba(255,85,85,0.15); color: var(--red); border: 1px solid rgba(255,85,85,0.3); }
.btn-danger:hover { background: rgba(255,85,85,0.25); }
.btn-ghost { background: transparent; color: var(--text2); }
.btn-ghost:hover { background: var(--surface); color: var(--text); }
.btn-sm { padding: 0.3rem 0.7rem; font-size: 0.78rem; }
.btn-icon { padding: 0.4rem; border-radius: 8px; }

/* FORMS */
input, select, textarea {
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); border-radius: var(--radius);
  padding: 0.5rem 0.75rem; font-size: 0.85rem; font-family: 'DM Sans', sans-serif;
  outline: none; transition: border-color 0.15s;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
input::placeholder { color: var(--text3); }
.form-group { margin-bottom: 1rem; }
.form-group label { display: block; font-size: 0.8rem; color: var(--text2); margin-bottom: 0.35rem; font-weight: 500; }
.form-group input, .form-group select, .form-group textarea { width: 100%; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.form-row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 1rem;
}
.modal {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--radius2); padding: 1.5rem;
  width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow);
}
.modal-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 600; margin-bottom: 1.25rem; }
.modal-footer { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1.25rem; padding-top: 1rem; border-top: 1px solid var(--border); }

/* ALERTS */
.alert { padding: 0.75rem 1rem; border-radius: var(--radius); margin-bottom: 1rem; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; }
.alert.red { background: rgba(255,85,85,0.1); border: 1px solid rgba(255,85,85,0.3); color: var(--red); }
.alert.green { background: rgba(54,201,142,0.1); border: 1px solid rgba(54,201,142,0.3); color: var(--green); }
.alert.yellow { background: rgba(255,204,68,0.1); border: 1px solid rgba(255,204,68,0.3); color: var(--yellow); }

/* SEARCH */
.search-bar {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 0.4rem 0.75rem;
}
.search-bar input { background: none; border: none; padding: 0; flex: 1; }
.search-bar .icon { color: var(--text3); font-size: 1rem; }

/* TABS */
.tabs { display: flex; gap: 2px; background: var(--bg3); border-radius: var(--radius); padding: 3px; margin-bottom: 1.25rem; }
.tab { flex: 1; text-align: center; padding: 0.4rem; border-radius: 7px; cursor: pointer; font-size: 0.8rem; color: var(--text2); transition: all 0.15s; border: none; background: none; font-family: 'DM Sans', sans-serif; }
.tab.active { background: var(--surface2); color: var(--text); font-weight: 500; }

/* TOAST */
.toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
.toast {
  padding: 0.75rem 1rem; border-radius: var(--radius); font-size: 0.85rem;
  animation: toastIn 0.2s ease; max-width: 320px;
  display: flex; align-items: center; gap: 8px; box-shadow: var(--shadow);
}
.toast.success { background: #1a3d2e; border: 1px solid var(--green); color: var(--green); }
.toast.error { background: #3d1a1a; border: 1px solid var(--red); color: var(--red); }
.toast.info { background: #1a2a3d; border: 1px solid var(--blue); color: var(--blue); }
@keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: none; } }

/* PARETO */
.pareto-bar-wrap { background: var(--bg3); border-radius: var(--radius); height: 12px; overflow: hidden; }
.pareto-bar { height: 100%; border-radius: var(--radius); background: var(--accent); transition: width 0.3s; }

/* LOW STOCK */
.low-stock-item { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 1rem; border-bottom: 1px solid var(--border); }
.low-stock-item:last-child { border-bottom: none; }

/* QR SCANNER */
#qr-reader { border-radius: var(--radius); overflow: hidden; }
#qr-reader video { border-radius: var(--radius); }

/* SECTION HEADER */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.section-header h2 { font-size: 1rem; font-weight: 600; }

/* CONNECTION STATUS */
.conn-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); display: inline-block; margin-right: 6px; }
.conn-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
.conn-dot.error { background: var(--red); }

/* EMPTY STATE */
.empty { text-align: center; padding: 3rem; color: var(--text3); }
.empty .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
.empty p { font-size: 0.9rem; }

/* MOVEMENT TYPE */
.mvt-in { color: var(--green); }
.mvt-out { color: var(--red); }
.mvt-adj { color: var(--yellow); }

/* CONFIG SETUP */
.setup-overlay {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 2000; padding: 1rem;
}
.setup-card { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius2); padding: 2rem; width: 100%; max-width: 480px; }
.setup-card h2 { font-family: 'Syne', sans-serif; font-size: 1.4rem; color: var(--accent); margin-bottom: 0.5rem; }
.setup-card p { color: var(--text2); font-size: 0.85rem; margin-bottom: 1.5rem; }

/* SCROLL */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

/* RESPONSIVE */
@media(max-width:768px) {
  .sidebar { width: 58px; min-width: 58px; }
  .sidebar-logo h1, .sidebar-logo p, .nav-item span, .nav-label { display: none; }
  .nav-item { justify-content: center; }
  .form-row, .form-row3 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- SETUP OVERLAY -->
<div class="setup-overlay" id="setupOverlay" style="display:none">
  <div class="setup-card">
    <h2>⚡ StockPro</h2>
    <p>Identifiants préconfigurés — cliquez sur Connexion ou modifiez si besoin.</p>
    <div class="form-group">
      <label>URL Supabase</label>
      <input type="text" id="cfgUrl" value="https://cjvlqicfjjhxjhtawbnq.supabase.co">
    </div>
    <div class="form-group">
      <label>Clé anonyme (anon key)</label>
      <input type="text" id="cfgKey" value="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqdmxxaWNmampoeGpodGF3Ym5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNDc2MTAsImV4cCI6MjA5MjgyMzYxMH0.G-j8H3PDCt2OI2qPiHUeWYJ9zmSwnGNJQyGp4tib8UE">
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="saveConfig()">Connexion</button>
    <div id="cfgError" style="margin-top:0.75rem;color:var(--red);font-size:0.8rem;min-height:1.2em"></div>
    <p style="margin-top:0.25rem;font-size:0.75rem;color:var(--text3)">Vos identifiants sont stockés localement dans le navigateur.</p>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<!-- APP -->
<div class="app" id="appRoot" style="display:none">

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <h1>StockPro</h1>
      <p>AIR2S • Aéraulique</p>
    </div>
    <span class="nav-label">Navigation</span>
    <button class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
      <span class="icon">📊</span><span>Tableau de bord</span>
    </button>
    <button class="nav-item" data-page="stock" onclick="navigate('stock')">
      <span class="icon">📦</span><span>Stock</span>
    </button>
    <button class="nav-item" data-page="commandes" onclick="navigate('commandes')">
      <span class="icon">🏗️</span><span>Commandes</span>
    </button>
    <button class="nav-item" data-page="historique" onclick="navigate('historique')">
      <span class="icon">📋</span><span>Historique</span>
    </button>
    <div class="nav-sep"></div>
    <span class="nav-label">Analyse</span>
    <button class="nav-item" data-page="pareto" onclick="navigate('pareto')">
      <span class="icon">📈</span><span>Analyse Pareto</span>
    </button>
    <button class="nav-item" data-page="alertes" onclick="navigate('alertes')">
      <span class="icon">🔔</span><span>Alertes</span>
    </button>
    <div class="nav-sep"></div>
    <span class="nav-label">Outils</span>
    <button class="nav-item" data-page="scan" onclick="navigate('scan')">
      <span class="icon">📷</span><span>Scanner QR</span>
    </button>
    <button class="nav-item" data-page="parametres" onclick="navigate('parametres')">
      <span class="icon">⚙️</span><span>Paramètres</span>
    </button>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:0.75rem">
        <span class="conn-dot" id="connDot"></span>
        <span class="topbar-title" id="pageTitle">Tableau de bord</span>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-secondary btn-sm" onclick="exportExcel()">⬇ Excel</button>
        ${IS_CLIENT_MODE ? '' : `<button class="btn btn-primary btn-sm" onclick="openMovementModal()">+ Mouvement</button>`}
      </div>
    </div>
    <div class="content" id="pageContent"></div>
  </div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modalOverlay" style="display:none">
  <div class="modal" id="modalContent"></div>
</div>

<script>
// ─── CONFIG & STATE ────────────────────────────────────────────────
let db = null;
let appState = {
  stock: [], commandes: [], historique: [], config: {},
  chantiers: [], alertSeuil: 5,
  currentPage: 'dashboard'
};

const CHANTIERS_DEFAUT = ['Dépôt central', 'Chantier A', 'Chantier B', 'Chantier C'];
const CATEGORIES = ['Coude', 'Te', 'Manchon', 'Réduction', 'Bouchon', 'Chapeau', 'Grille', 'Registre', 'Flexible', 'Autre'];

// ─── DEFAULTS ─────────────────────────────────────────────────────
const DEFAULT_URL = 'https://cjvlqicfjjhxjhtawbnq.supabase.co';
const DEFAULT_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqdmxxaWNmampoeGpodGF3Ym5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNDc2MTAsImV4cCI6MjA5MjgyMzYxMH0.G-j8H3PDCt2OI2qPiHUeWYJ9zmSwnGNJQyGp4tib8UE';

// Mode client (lecture seule) si ?mode=client dans l'URL
const IS_CLIENT_MODE = new URLSearchParams(window.location.search).get('mode') === 'client';

// ─── INIT ──────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  const url = localStorage.getItem('sp_url') || DEFAULT_URL;
  const key = localStorage.getItem('sp_key') || DEFAULT_KEY;
  if (IS_CLIENT_MODE) {
    document.body.classList.add('client-mode');
    showClientBanner();
  }
  // Masquer l'overlay et afficher l'app directement (credentials préconfigurés)
  document.getElementById('setupOverlay').style.display = 'none';
  document.getElementById('appRoot').style.display = 'flex';
  await initSupabase(url, key);
});

async function saveConfig() {
  const url = document.getElementById('cfgUrl').value.trim() || DEFAULT_URL;
  const key = document.getElementById('cfgKey').value.trim() || DEFAULT_KEY;
  localStorage.setItem('sp_url', url);
  localStorage.setItem('sp_key', key);
  await initSupabase(url, key);
}

async function initSupabase(url, key) {
  const errDiv = document.getElementById('cfgError');
  if (errDiv) errDiv.textContent = '';
  try {
    db = window.supabase.createClient(url, key);
    await loadAll();
    document.getElementById('setupOverlay').style.display = 'none';
    document.getElementById('appRoot').style.display = 'flex';
    document.getElementById('connDot').className = 'conn-dot connected';
    setupRealtime();
    navigate('dashboard');
  } catch(e) {
    console.error('Supabase init error:', e);
    document.getElementById('setupOverlay').style.display = 'flex';
    document.getElementById('connDot').className = 'conn-dot error';
    if (errDiv) errDiv.textContent = 'Erreur : ' + (e.message || String(e));
    else toast('Connexion échouée : ' + (e.message || e), 'error');
  }
}

// ─── DATA LOADING ──────────────────────────────────────────────────
async function loadAll() {
  const safe = async (p) => { try { return await p; } catch(e) { return {data:null,error:e}; } };
  const [s, c, h, cfg] = await Promise.all([
    safe(db.from('stock').select('*').order('reference')),
    safe(db.from('commandes').select('*').order('created_at', {ascending: false})),
    safe(db.from('historique').select('*').order('created_at', {ascending: false}).limit(500)),
    safe(db.from('config').select('*'))
  ]);
  if (s.error && !s.data) { console.warn('stock:', s.error?.message); }
  else if (s.data) appState.stock = s.data;
  if (c.data) appState.commandes = c.data;
  if (h.data) appState.historique = h.data;
  if (cfg.data && cfg.data.length > 0) {
    cfg.data.forEach(r => { appState.config[r.cle] = r.valeur; });
    appState.alertSeuil = parseInt(appState.config.seuil_alerte || '5');
    appState.chantiers = appState.config.chantiers
      ? JSON.parse(appState.config.chantiers)
      : CHANTIERS_DEFAUT;
  }
}

// ─── REALTIME ──────────────────────────────────────────────────────
function setupRealtime() {
  db.channel('stockpro-changes')
    .on('postgres_changes', {event:'*', schema:'public', table:'stock'}, async () => {
      const {data} = await db.from('stock').select('*').order('reference');
      if (data) { appState.stock = data; refreshPage(); }
    })
    .on('postgres_changes', {event:'*', schema:'public', table:'commandes'}, async () => {
      const {data} = await db.from('commandes').select('*').order('created_at', {ascending:false});
      if (data) { appState.commandes = data; refreshPage(); }
    })
    .on('postgres_changes', {event:'*', schema:'public', table:'historique'}, async () => {
      const {data} = await db.from('historique').select('*').order('created_at', {ascending:false}).limit(500);
      if (data) { appState.historique = data; refreshPage(); }
    })
    .subscribe();
}

function refreshPage() { navigate(appState.currentPage, true); }

// ─── NAVIGATION ────────────────────────────────────────────────────
const PAGE_TITLES = {
  dashboard:'Tableau de bord', stock:'Stock', commandes:'Commandes par chantier',
  historique:'Historique des mouvements', pareto:'Analyse Pareto',
  alertes:'Alertes stock bas', scan:'Scanner QR code', parametres:'Paramètres'
};

function navigate(page, silent=false) {
  appState.currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.page === page);
  });
  document.getElementById('pageTitle').textContent = PAGE_TITLES[page] || page;
  const pages = {
    dashboard: renderDashboard,
    stock: renderStock,
    commandes: renderCommandes,
    historique: renderHistorique,
    pareto: renderPareto,
    alertes: renderAlertes,
    scan: renderScan,
    parametres: renderParametres
  };
  if (pages[page]) {
    document.getElementById('pageContent').innerHTML = pages[page]();

function renderPareto() {
  // Sorties par référence
  const sorties = {};
  appState.historique.filter(h => h.type === 'sortie').forEach(h => {
    if (h.reference) sorties[h.reference] = (sorties[h.reference]||0) + (h.quantite||0);
  });
  const sorted = Object.entries(sorties).sort((a,b) => b[1]-a[1]);
  const totalSorties = sorted.reduce((a,s) => a+s[1], 0);
  let cumul = 0;
  const rows = sorted.slice(0, 20).map(([ref, qte], i) => {
    cumul += qte;
    const pct = totalSorties ? (qte/totalSorties*100) : 0;
    const cumulPct = totalSorties ? (cumul/totalSorties*100) : 0;
    const art = appState.stock.find(s=>s.reference===ref);
    return { ref, qte, pct, cumulPct, designation: art?.designation||'', i };
  });

  return `
<div class="card" style="margin-bottom:1rem">
  <div class="section-header"><h2>Top 20 références – sorties cumulées</h2></div>
  <p style="color:var(--text2);font-size:0.82rem;margin-bottom:1.25rem">Les références représentant 80% des sorties sont en orange — appliquez-leur une attention particulière.</p>
  <div class="table-wrap">
    <table>
      <thead><tr><th>#</th><th>Référence</th><th>Désignation</th><th>Sorties</th><th>Part</th><th>Cumul</th><th>Répartition</th></tr></thead>
      <tbody>
      ${rows.length === 0 ? `<tr><td colspan="7"><div class="empty"><div class="icon">📈</div><p>Aucune sortie enregistrée</p></div></td></tr>` :
        rows.map(r => `<tr style="${r.cumulPct<=80?'background:rgba(244,124,32,0.04)':''}">
          <td style="color:var(--text3);font-size:0.8rem">${r.i+1}</td>
          <td><span style="font-family:monospace;font-size:0.82rem;color:${r.cumulPct<=80?'var(--accent)':'var(--blue)'}">${r.ref}</span></td>
          <td style="font-size:0.82rem">${r.designation}</td>
          <td style="font-weight:600">${r.qte}</td>
          <td style="color:var(--text2)">${r.pct.toFixed(1)}%</td>
          <td><span class="badge ${r.cumulPct<=80?'orange':'gray'}">${r.cumulPct.toFixed(1)}%</span></td>
          <td style="min-width:120px"><div class="pareto-bar-wrap"><div class="pareto-bar" style="width:${r.pct.toFixed(1)}%;background:${r.cumulPct<=80?'var(--accent)':'var(--surface2)'}"></div></div></td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>
  <div style="margin-top:1rem;display:flex;gap:1rem">
    <span class="badge orange">Zone 80% (Vital Few)</span>
    <span class="badge gray">Zone 20% (Useful Many)</span>
    <span style="margin-left:auto;color:var(--text3);font-size:0.8rem">Total sorties : ${totalSorties.toLocaleString('fr')} unités</span>
  </div>
</div>`;
}

let qrScanner = null;
function initScanner() {
  setTimeout(() => {
    if (qrScanner) { qrScanner.stop().catch(()=>{}); qrScanner = null; }
    qrScanner = new Html5Qrcode('qr-reader');
    qrScanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: 250 },
      (text) => {
        qrScanner.stop().catch(()=>{});
        handleQrResult(text);
      },
      () => {}
    ).catch(e => {
      document.getElementById('qr-result').innerHTML = `<div class="alert red">Caméra inaccessible : ${e}</div>`;
    });
  }, 200);
}

function handleQrResult(text) {
  document.getElementById('qr-result').innerHTML = `
    <div class="alert green">✓ QR scanné : <strong>${text}</strong></div>`;
  const art = appState.stock.find(s => s.reference === text || s.id === text);
  if (art) {
    setTimeout(() => openMvtModal(art), 500);
  } else {
    document.getElementById('qr-result').innerHTML += `
      <div class="alert yellow">Référence introuvable dans le stock. Voulez-vous créer cet article ?
        <button class="btn btn-primary btn-sm" style="margin-left:0.5rem" onclick="openArticleModal('${text}')">Créer</button>
      </div>`;
  }
}

async function saveMouvement() {
  const ref = document.getElementById('mvtRef')?.value || document.getElementById('mvtRefHidden')?.value;
  if (!ref) { toast('Sélectionnez une référence', 'error'); return; }
  const art = appState.stock.find(s => s.reference === ref);
  if (!art) { toast('Article introuvable', 'error'); return; }
  await enregistrerMouvement(art, art.designation||'', art.quantite||0);
}

async function saveMvtDirect(id, designation, qteActuelle) {
  const art = appState.stock.find(s => s.id === id);
  if (!art) { toast('Article introuvable', 'error'); return; }
  await enregistrerMouvement(art, designation, qteActuelle);
}

async function enregistrerMouvement(art, designation, qteActuelle) {
  const type = document.getElementById('mvtType').value;
  const qte = parseInt(document.getElementById('mvtQte').value) || 0;
  const chantier = document.getElementById('mvtChantier').value;
  const note = document.getElementById('mvtNote').value;

  if (qte <= 0 && type !== 'ajustement') { toast('Quantité invalide', 'error'); return; }

  let nouvelleQte;
  if (type === 'entree') nouvelleQte = qteActuelle + qte;
  else if (type === 'sortie') nouvelleQte = Math.max(0, qteActuelle - qte);
  else nouvelleQte = qte;

  const { error: e1 } = await db.from('stock').update({ quantite: nouvelleQte }).eq('id', art.id);
  if (e1) { toast('Erreur mise à jour stock : ' + e1.message, 'error'); return; }

  await db.from('historique').insert({
    reference: art.reference, designation,
    type, quantite: qte, chantier, note,
    qte_avant: qteActuelle, qte_apres: nouvelleQte
  });

  closeModal();
  await loadAll();
  navigate(appState.currentPage, true);
  toast(`Mouvement enregistré (${type}) : ${qte} unité(s)`, 'success');
}

// ─── EXPORT EXCEL ──────────────────────────────────────────────────
function exportExcel() {
  const wb = XLSX.utils.book_new();

  // Stock
  const stockData = [['Référence','Désignation','Catégorie','Diamètre','Quantité','Seuil','Prix achat','Prix vente','Fournisseur','Valeur achat','Emplacement']];
  appState.stock.forEach(s => stockData.push([
    s.reference, s.designation, s.categorie, s.diametre, s.quantite,
    s.seuil_alerte, s.prix_unitaire, s.prix_vente, s.fournisseur,
    (s.quantite||0)*(s.prix_unitaire||0), s.emplacement
  ]));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(stockData), 'Stock');

  // Commandes
  const cmdData = [['Date','Chantier','Référence','Désignation','Quantité','Statut','Note']];
  appState.commandes.forEach(c => cmdData.push([
    fmtDateTime(c.created_at), c.chantier, c.reference, c.designation, c.quantite, c.statut, c.note
  ]));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(cmdData), 'Commandes');

  // Historique
  const histData = [['Date','Type','Référence','Désignation','Quantité','Chantier','Avant','Après','Note']];
  appState.historique.forEach(h => histData.push([
    fmtDateTime(h.created_at), h.type, h.reference, h.designation,
    h.quantite, h.chantier, h.qte_avant, h.qte_apres, h.note
  ]));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(histData), 'Historique');

  // Pareto
  const sorties = {};
  appState.historique.filter(h=>h.type==='sortie').forEach(h => {
    if(h.reference) sorties[h.reference]=(sorties[h.reference]||0)+(h.quantite||0);
  });
  const sorted = Object.entries(sorties).sort((a,b)=>b[1]-a[1]);
  const totalSorties = sorted.reduce((a,s)=>a+s[1],0);
  let cumul=0;
  const paretoData = [['Rang','Référence','Désignation','Sorties','Part%','Cumul%']];
  sorted.forEach(([ref,qte],i) => {
    cumul += qte;
    const art = appState.stock.find(s=>s.reference===ref);
    paretoData.push([i+1, ref, art?.designation||'', qte,
      totalSorties?(qte/totalSorties*100).toFixed(1):0,
      totalSorties?(cumul/totalSorties*100).toFixed(1):0]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(paretoData), 'Pareto');

  XLSX.writeFile(wb, `StockPro_AIR2S_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Export Excel téléchargé ✓', 'success');
}

// ─── UTILS ─────────────────────────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '-';
  return new Date(iso).toLocaleDateString('fr-FR');
}
function fmtDateTime(iso) {
  if (!iso) return '-';
  return new Date(iso).toLocaleString('fr-FR', {day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
}

function toast(msg, type='info') {
  const c = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${type==='success'?'✓':type==='error'?'✗':'ℹ'}</span> ${msg}`;
  c.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function showClientBanner() {
  const banner = document.createElement('div');
  banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9998;background:rgba(74,158,255,0.15);border-bottom:1px solid rgba(74,158,255,0.4);padding:6px 1.5rem;font-size:0.78rem;color:var(--blue);display:flex;align-items:center;gap:8px;';
  banner.innerHTML = '👁 Mode consultation — Accès lecture seule. Les modifications ne sont pas disponibles dans ce mode.';
  document.body.prepend(banner);
}
